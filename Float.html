<!DOCTYPE html>
<html>
    <head>
        <style>
            img#flowerRight {
                float:right
            }
            img#flowerLeft {
                float:left
            }

        </style>
    </head>
    <body>

        <h2>Float Right</h2>

        <p> In this example this image will float to the right in the paragraph, and the text in the paragraph will wrap around the image.</p>

        <img id="flowerRight" src="animated hibiscus flower.png" alt="Flower"
        style="width:100px; height:100px;">
        <img id="flowerLeft" src="animated hibiscus flower.png" alt="Flower"
        style="width:100px; height:100px;">
        This is an example of how a float property works!
    </body>
</html>
