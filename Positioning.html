<!DOCTYPE html>
<head>
    <style>
        div {
            right: 30px;
            border: 3px solid darkolivegreen;
        }
        div.absolute {
            position:absolute;
            left: 50px;
            border: 3px solid palegoldenrod;
        }
        div.relative {
            position:relative;
            left: 100px;
            border: 3px solid lightsalmon;
        }
        div.fixed {
            position: fixed;
            top: 0;
            right: 20px;
            width: 300px;
            border:3px solid lightsteelblue;
        }
        div.sticky {
            position: sticky;
            top: 1px;
            left: 20px;
            width: 100px;
            border:3px solid lightcoral;
        }
    </style>
</head>
<body>
    <h2>POSITIONING</h2>
    <div>
        Div with no position property
    </div>
    <div class="sticky">
        Div with sticky position property
    </div>
    <div class="relative">
        This div elements has position: relative
    </div>
    <div class="absolute">
        Absolute class DIV
    </div>
    <div class="fixed">
        Div with fixed position property
    </div>
