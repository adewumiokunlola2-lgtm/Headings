<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling Examples</title>
</head>
<body>
<style>
p {
    font-size: 20px;
    background-color: teal;
    color: white;
    font-family: arial;
    font-style: inherit;
}
p {
    background-color: aqua;
    color: black;
    font-size: 25px;
    text-align: justify;
    font-style: oblique;
}
</style>
</head>
<body>
<p>This is an example of CSS styling.</p>
<p>This is very fun to do, especially when you get the hang of it and see the results!</p>
</body>
</html>
</body>
</html>
